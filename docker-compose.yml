version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: nexmart_mongodb
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    container_name: nexmart_mongo_init
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      bash -c "mongosh --host mongodb:27017 --eval 'rs.initiate()'"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: nexmart_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
